name: safeher
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.5.2
  camera: ^0.10.5+9
  permission_handler: ^11.3.1
  flutter_background_service: ^5.0.5
  provider: ^6.1.2
  google_fonts: ^8.0.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  geolocator: ^13.0.2
  flutter_html: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  speech_to_text: ^7.0.0
  xml: any
  shared_preferences: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.jpeg


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.jpeg"